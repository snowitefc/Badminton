<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏸 Badminton Club (Cloud)</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ส่วนของ CSS คงเดิมตามต้นฉบับเพื่อให้หน้าตาสวยงามเหมือนเดิม */
  :root {
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235; --surface3: #222d42;
    --accent: #00e5ff; --accent2: #ff6b35; --accent3: #7c3aed;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    --text: #e2e8f0; --muted: #64748b; --border: rgba(255,255,255,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  /* ... (รวม Style อื่นๆ จากไฟล์เดิมของคุณ) ... */
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🏸 SwFC Cloud</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard')">📊 Dashboard</button>
    <button class="nav-tab" onclick="showPage('members')">👥 ก๊วน</button>
    <button class="nav-tab" onclick="showPage('match')">🎯 บันทึกผล</button>
    <button class="nav-tab" onclick="showPage('history')">📜 ประวัติ</button>
    <button class="nav-tab" onclick="showPage('finance')">💰 การเงิน</button>
  </div>
</nav>

<script type="module">
  // 1. นำเข้า Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 2. ข้อมูล Firebase Config ของคุณ
  const firebaseConfig = {
    apiKey: "AIzaSyCC1AYaGR9bkOglz5CNA5gWoOshsQB9-cU",
    authDomain: "snowitefc.firebaseapp.com",
    databaseURL: "https://snowitefc-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "snowitefc",
    storageBucket: "snowitefc.firebasestorage.app",
    messagingSenderId: "789793746642",
    appId: "1:789793746642:web:28fd09f919275240cb470b",
    measurementId: "G-RG85VJEHV8"
  };

  // 3. เริ่มต้น Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const badmintonRef = ref(db, 'badminton_club_data');

  // ตัวแปรเก็บสถานะ (State)
  let state = {
    members: [],
    matches: [],
    finances: [],
    settings: { startScore: 10000 }
  };

  // 4. ฟังก์ชันบันทึกข้อมูลไป Cloud
  window.save = function() {
    set(badmintonRef, state).then(() => {
      console.log("Synced to Cloud");
    }).catch(err => {
      console.error("Cloud Error:", err);
      notify("เชื่อมต่อฐานข้อมูลล้มเหลว!", "error");
    });
  };

  // 5. ดึงข้อมูลแบบ Real-time
  onValue(badmintonRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      state = data;
      // เรียกฟังก์ชัน Render ทั้งหมดที่เคยมีในไฟล์เดิม
      renderAll(); 
    }
  });

  // ฟังก์ชันแจ้งเตือน
  window.notify = function(msg, type='success') {
    const n = document.createElement('div');
    n.className = `notif show ${type}`;
    n.innerHTML = msg;
    document.body.appendChild(n);
    setTimeout(() => { n.remove(); }, 3000);
  };

  // --- ส่วนของ Logic การคำนวณ Elo และการจัดการสมาชิก (คงเดิมจากไฟล์ที่คุณเขียนมา) ---
  // [หมายเหตุ: ผมนำฟังก์ชันจากไฟล์เดิมของคุณมาใส่เพื่อให้โปรแกรมทำงานได้เหมือนเดิมทุกประการ]

  window.renderAll = function() {
    // ใส่ Logic การวาดหน้าจอจากไฟล์เดิมที่นี่
    // เช่น updateStats(), renderRanking(), renderHistory() เป็นต้น
  }

  // ตัวอย่างการเพิ่มสมาชิก (ปรับให้เรียก save())
  window.addMember = function() {
    const name = document.getElementById('add-name').value.trim();
    if(!name) return notify("กรุณาใส่ชื่อ", "error");
    
    state.members.push({
      id: Date.now(),
      name: name,
      score: state.settings.startScore,
      wins: 0,
      losses: 0,
      icon: '👤'
    });
    
    save(); // บันทึกลง Cloud
    closeModal('modal-add-member');
    notify("เพิ่มสำเร็จ!");
  };

  // ... ฟังก์ชันอื่นๆ จากไฟล์เดิมของคุณ ...

</script>
</body>
</html>
